MANIFEST.categories.forEach(c => { categories[c.id] = c; });

// Session key for localStorage
const SESSION = 'vr-' + MANIFEST.title.replace(/\s+/g, '-').toLowerCase().substring(0, 30);

// Load saved state
let state = {};
try { state = JSON.parse(localStorage.getItem(SESSION) || '{}'); } catch(e) {}

// Build nav pips
const nav = document.getElementById('nav');
edits.forEach(e => {
  const b = document.createElement('button');
  b.className = 'pip';
  b.textContent = e.id.replace('edit-', '');
  b.title = `${e.description}`;
  const cat = categories[e.category];
  if (cat) b.style.borderLeft = `3px solid ${cat.color}`;
  b.onclick = () => show(e.id);
  b.id = `pip-${e.id}`;
  nav.appendChild(b);
});

function updatePipStates() {
  edits.forEach(e => {
    const pip = document.getElementById(`pip-${e.id}`);
    if (!pip) return;
    pip.classList.remove('approved', 'rejected', 'active');
    const s = state[e.id] || 'pending';
    if (s === 'approved') pip.classList.add('approved');
    if (s === 'rejected') pip.classList.add('rejected');
  });
  if (currentId) {
    const activePip = document.getElementById(`pip-${currentId}`);
    if (activePip) activePip.classList.add('active');
  }
  updateSummary();
}

function updateSummary() {
  const approved = edits.filter(e => state[e.id] === 'approved').length;
  const rejected = edits.filter(e => state[e.id] === 'rejected').length;
  const pending = edits.length - approved - rejected;
  document.getElementById('summary').innerHTML =
    `<span class="s-approved">${approved} approved</span>` +
    `<span class="s-rejected">${rejected} rejected</span>` +
    `<span class="s-pending">${pending} pending</span>`;
}

let currentId = null;
function show(id) {
  currentId = id;
  const e = edits.find(x => x.id === id);
  if (!e) return;
  const cat = categories[e.category] || {};
  const s = state[id] || 'pending';

  // Update annotation card
  const numEl = document.getElementById('aNum');
  numEl.textContent = id.replace('edit-', '');
  numEl.className = 'anno-num ' + s + '-ring';

  const catEl = document.getElementById('aCat');
  catEl.textContent = cat.label || e.category;
  catEl.style.background = (cat.color || '#333') + '30';
  catEl.style.color = cat.color || '#999';

  document.getElementById('aDesc').textContent = e.description;
  document.getElementById('aLoc').textContent = `${e.file}:${e.line}`;
  document.getElementById('aOld').innerHTML = e.oldText;
  const newEl = document.getElementById('aNew');
  newEl.innerHTML = e.newText;
  newEl.className = 'anno-text new' + (s !== 'pending' ? ` ${s}-state` : '');
  document.getElementById('aNote').innerHTML = '\ud83d\udcdd ' + (e.reasoning || '');

  // Update approve/reject button highlighting
  document.querySelector('.btn-approve').classList.toggle('selected', s === 'approved');
  document.querySelector('.btn-reject').classList.toggle('selected', s === 'rejected');

  // Inject highlight first
  injectHighlight(e);

  // Scroll: inject a scroll script into the after iframe to scrollIntoView
  syncing = true;
  try {
    const winB = document.getElementById('ifB').contentWindow;
    const docB = document.getElementById('ifB').contentDocument;
    const highlighted = docB.querySelector('.vr-highlighted');
    if (highlighted || e.scrollY > 0) {
      // Disable smooth scroll (it blocks programmatic scrollTop from parent)
      const htmlB = docB.documentElement;
      const htmlA = document.getElementById('ifA').contentDocument.documentElement;
      htmlB.style.scrollBehavior = 'auto';
      htmlA.style.scrollBehavior = 'auto';

      // Use the manifest's scrollY — elements may be zero-height until scrolled into view
      const targetY = e.scrollY || 0;
      htmlB.scrollTop = targetY;
      htmlA.scrollTop = targetY;

      // Re-enable smooth scroll and re-inject highlight after layout settles
      requestAnimationFrame(() => {
        htmlB.style.scrollBehavior = '';
        htmlA.style.scrollBehavior = '';
        // Re-inject highlight now that the element should be laid out
        setTimeout(() => { injectHighlight(e); }, 200);
      });

      setTimeout(() => { syncing = false; }, 400);
    } else if (e.scrollY > 0) {
      try { document.getElementById('ifA').contentWindow.scrollTo({top: e.scrollY, behavior:'smooth'}); } catch(x) {}
      try { winB.scrollTo({top: e.scrollY, behavior:'smooth'}); } catch(x) {}
      setTimeout(() => { syncing = false; }, 600);
    } else {
      syncing = false;
    }
  } catch(x) { syncing = false; }

  updatePipStates();
}

function injectHighlight(edit) {
  try {
    const doc = document.getElementById('ifB').contentDocument;
    if (!doc) return;

    // Remove previous highlights — restore original styles
    doc.querySelectorAll('.vr-highlighted').forEach(el => {
      el.style.outline = el.dataset.vrOrigOutline || '';
      el.style.outlineOffset = el.dataset.vrOrigOffset || '';
      el.style.boxShadow = el.dataset.vrOrigShadow || '';
      el.style.position = el.dataset.vrOrigPosition || '';
      el.classList.remove('vr-highlighted');
    });
    doc.querySelectorAll('.vr-badge').forEach(el => el.remove());

    if (!edit.selector) return;
    let target = null;

    // Use selectorAfter if available (for when Danielle changed the h4 title)
    const sel = edit.selectorAfter || edit.selector;

    // If selector starts with "text:" use text-based matching to find parent card
    if (sel.startsWith('text:')) {
      const searchText = sel.substring(5);
      const allH4 = doc.querySelectorAll('h4');
      for (const h4 of allH4) {
        if (h4.textContent.trim() === searchText) {
          target = h4.closest('.workshop-card') || h4.closest('.phase-card') || h4.closest('section') || h4.parentElement;
          break;
        }
      }
      // Fallback: try original selector if selectorAfter didn't match
      if (!target && edit.selectorAfter && edit.selector.startsWith('text:')) {
        const fallbackText = edit.selector.substring(5);
        for (const h4 of allH4) {
          if (h4.textContent.trim() === fallbackText) {
            target = h4.closest('.workshop-card') || h4.closest('.phase-card') || h4.closest('section') || h4.parentElement;
            break;
          }
        }
      }
    } else {
      target = doc.querySelector(sel);
    }
    if (!target) return;

    // Save original styles
    const cs = doc.defaultView.getComputedStyle(target);
    target.dataset.vrOrigOutline = target.style.outline;
    target.dataset.vrOrigOffset = target.style.outlineOffset;
    target.dataset.vrOrigShadow = target.style.boxShadow;
    target.dataset.vrOrigPosition = target.style.position;

    // Apply highlight directly to the element — no offset calculation needed
    target.classList.add('vr-highlighted');
    target.style.outline = '3px solid #dc2626';
    target.style.outlineOffset = '4px';
    target.style.boxShadow = '0 0 0 8px rgba(220,38,38,0.15), 0 0 30px rgba(220,38,38,0.25)';
    if (cs.position === 'static') target.style.position = 'relative';

    // Badge — positioned relative to the target element
    const badge = doc.createElement('div');
    badge.className = 'vr-badge';
    badge.style.cssText = `
      position:absolute;top:-14px;left:-14px;
      width:24px;height:24px;border-radius:50%;
      background:#dc2626;color:#fff;
      font-size:11px;font-weight:700;font-family:system-ui;
      display:flex;align-items:center;justify-content:center;
      z-index:100000;box-shadow:0 2px 8px rgba(0,0,0,0.3);
    `;
    badge.textContent = edit.id.replace('edit-', '');
    target.appendChild(badge);

    // Inject styles if not already — including override to force all elements visible
    if (!doc.getElementById('vr-styles')) {
      const style = doc.createElement('style');
      style.id = 'vr-styles';
      style.textContent = `
        /* Force all animated/hidden elements visible for review */
        .workshop-card, .phase-card, .why-card, .journey-step,
        section, .how-card, .team-card, .cta-section {
          opacity: 1 !important;
          transform: none !important;
          transition: none !important;
          max-height: none !important;
          visibility: visible !important;
        }
        .vr-highlighted {
          animation: vrpulse 2s infinite;
        }
        @keyframes vrpulse {
          0%,100% { box-shadow:0 0 0 8px rgba(220,38,38,0.15),0 0 30px rgba(220,38,38,0.25); }
          50% { box-shadow:0 0 0 12px rgba(220,38,38,0.08),0 0 40px rgba(220,38,38,0.35); }
        }
      `;
      doc.head.appendChild(style);
    }
  } catch(e) {
    // Cross-origin or timing issue — silently ignore
  }
}

function decide(decision) {
  if (!currentId) return;
  state[currentId] = decision;
  localStorage.setItem(SESSION, JSON.stringify(state));
  updatePipStates();
  show(currentId); // Refresh card to show new state
  // Auto-advance to next pending
  setTimeout(() => {
    const nextPending = edits.find(e => !state[e.id] || state[e.id] === 'pending');
    if (nextPending && nextPending.id !== currentId) {
      // Don't auto-advance, let human click Next
    }
  }, 300);
}

function go(dir) {
  const idx = edits.findIndex(e => e.id === currentId);
  let next = idx + dir;
  if (next < 0) next = edits.length - 1;
  if (next >= edits.length) next = 0;
  show(edits[next].id);
}

function exportApprovals() {
  const decisions = edits.map(e => ({
    id: e.id,
    category: e.category,
    file: e.file,
    line: e.line,
    description: e.description,
    decision: state[e.id] || 'pending'
  }));

  const output = {
    title: MANIFEST.title,
    jiraStory: MANIFEST.jiraStory || '',
    exportedAt: new Date().toISOString(),
    summary: {
      total: edits.length,
      approved: decisions.filter(d => d.decision === 'approved').length,
      rejected: decisions.filter(d => d.decision === 'rejected').length,
      pending: decisions.filter(d => d.decision === 'pending').length
    },
    decisions: decisions,
    categories: MANIFEST.categories.map(c => ({
      ...c,
      approvedEdits: decisions.filter(d => d.category === c.id && d.decision === 'approved').map(d => d.id),
      rejectedEdits: decisions.filter(d => d.category === c.id && d.decision === 'rejected').map(d => d.id)
    }))
  };

  // Download as JSON
  const blob = new Blob([JSON.stringify(output, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'approval-decisions.json';
  a.click();
  URL.revokeObjectURL(url);

  // Also copy to clipboard
  navigator.clipboard.writeText(JSON.stringify(output, null, 2)).catch(() => {});
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(-1);
  if (e.key === 'a' || e.key === 'A') decide('approved');
  if (e.key === 'r' || e.key === 'R') decide('rejected');
});

// Sync scrolling between iframes
let syncing = false;
function setupSyncScroll() {
  const ifA = document.getElementById('ifA');
  const ifB = document.getElementById('ifB');
  try {
    const docA = ifA.contentDocument || ifA.contentWindow.document;
    const docB = ifB.contentDocument || ifB.contentWindow.document;
    const winA = ifA.contentWindow;
    const winB = ifB.contentWindow;

    winA.addEventListener('scroll', () => {
      if (syncing) return;
      syncing = true;
      docB.documentElement.style.scrollBehavior = 'auto';
      docB.documentElement.scrollTop = docA.documentElement.scrollTop;
      requestAnimationFrame(() => { docB.documentElement.style.scrollBehavior = ''; syncing = false; });
    });

    winB.addEventListener('scroll', () => {
      if (syncing) return;
      syncing = true;
      docA.documentElement.style.scrollBehavior = 'auto';
      docA.documentElement.scrollTop = docB.documentElement.scrollTop;
      requestAnimationFrame(() => { docA.documentElement.style.scrollBehavior = ''; syncing = false; });
    });
  } catch(e) {}
}

// Init — wait for iframes to load, then sync
const ifA = document.getElementById('ifA');
const ifB = document.getElementById('ifB');
let loaded = 0;
function forceAllVisible(iframe) {
  try {
    const doc = iframe.contentDocument;
    if (!doc) return;
    const style = doc.createElement('style');
    style.id = 'vr-force-visible';
    style.textContent = `
      .workshop-card, .phase-card, .why-card, .journey-step,
      section, .how-card, .team-card, .cta-section {
        opacity: 1 !important;
        transform: none !important;
        transition: none !important;
        max-height: none !important;
        visibility: visible !important;
      }
      /* Force hidden panels visible for review — these are tab/phase panels with display:none */
      .grade-panel {
        display: block !important;
        opacity: 1 !important;
        visibility: visible !important;
      }
    `;
    doc.head.appendChild(style);
  } catch(e) {}
}

function onIframeLoad() {
  loaded++;
  forceAllVisible(document.getElementById('ifA'));
  forceAllVisible(document.getElementById('ifB'));
  if (loaded >= 2) {
    setupSyncScroll();
    if (edits.length) show(edits[0].id);
  }
}
ifA.addEventListener('load', onIframeLoad);
ifB.addEventListener('load', onIframeLoad);
// Fallback in case load already fired
setTimeout(() => { if (loaded < 2) { loaded = 2; setupSyncScroll(); if (edits.length) show(edits[0].id); } }, 2000);
</script>
